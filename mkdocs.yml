site_name: Enterprise AI Operator Documentation Suite v3
site_description: Enterprise governance, architecture, Domain 03 cybersecurity, and AI operations documentation.
repo_name: IRsoctierDT/EAODS-v3
repo_url: https://github.com/IRsoctierDT/EAODS-v3
docs_dir: docs
site_dir: site

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences

plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true

nav:
  - Home: index.md
  - Overview:
      - Vision: overview/vision.md
      - Repository Map: overview/repository-map.md
  - Frameworks:
      - v17.3 Platform Engineering:
          - Volume 8 — Security Engineering: frameworks/EAODS-v17.3/volume-08-security-engineering.md
          - Volume 9 — Infrastructure Resilience: frameworks/EAODS-v17.3/volume-09-infrastructure-resilience.md
          - Volume 10 — Platform Operations & SRE: frameworks/EAODS-v17.3/volume-10-platform-operations.md
          - Volume 11 — Control Catalog & Compliance: frameworks/EAODS-v17.3/volume-11-control-catalog.md
  - Standards:
      - STD-0001 Terminology & Identifiers: standards/canonical-terminology-and-identifiers.md
  - Patterns:
      - Pattern Library: patterns/index.md
      - PAT-0001 Zero Trust Service Identity: patterns/PAT-0001-zero-trust-service-identity.md
      - PAT-0002 Error-Budget-Gated Delivery: patterns/PAT-0002-error-budget-gated-delivery.md
      - PAT-0003 Continuous Assurance Evidence Pipeline: patterns/PAT-0003-continuous-assurance-evidence-pipeline.md
      - PAT-0004 Governed Recovery Orchestration: patterns/PAT-0004-governed-recovery-orchestration.md
  - Runbooks:
      - Runbook Library: runbooks/index.md
      - RUN-0001 Service Recovery Execution: runbooks/RUN-0001-service-recovery-execution.md
      - RUN-0002 Error Budget Exhaustion Response: runbooks/RUN-0002-error-budget-exhaustion-response.md
      - RUN-0003 Compliance Deviation Response: runbooks/RUN-0003-compliance-deviation-response.md
  - Governance:
      - Governance: governance/GOVERNANCE.md
      - Security: governance/SECURITY.md
      - Contributing: governance/CONTRIBUTING.md
      - Roadmap: governance/ROADMAP.md
